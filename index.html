<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title" id="siteTitle">
          Smart Routine &amp; Product Advisor
        </h1>
      </header>

      <div class="language-section">
        <label for="languageSelector" id="languageLabel">Language</label>
        <select id="languageSelector" aria-label="Language selector"></select>
      </div>

      <!-- Category Filter -->
      <div class="search-section">
        <select id="categoryFilter" aria-label="Category filter">
          <option value="" disabled selected>Choose a Category</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <h2 id="selectedProductsHeading">Selected Products</h2>
        <div id="selectedProductsList"></div>
        <div class="generate-btn-group">
          <button id="generateSkincareRoutine" class="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span class="generate-btn-text" id="skincareRoutineText"
              >Skincare Routine</span
            >
          </button>
          <button id="generateHaircareRoutine" class="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span class="generate-btn-text" id="haircareRoutineText"
              >Haircare Routine</span
            >
          </button>
        </div>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <div class="chat-header">
          <h2 id="chatHeading">Let's Build Your Routine</h2>
          <button
            id="clearConversationBtn"
            class="clear-conversation-btn"
            title="Clear conversation history"
            aria-label="Clear conversation history"
          >
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines..."
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p id="footerCopyright">&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav aria-label="Footer links">
          <!-- These URLs are placeholders -->
          <a href="#" id="privacyLink">Privacy Policy</a>
          <a href="#" id="termsLink">Terms of Use</a>
          <a href="#" id="contactLink">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="script.js"></script>
  </body>
</html>
